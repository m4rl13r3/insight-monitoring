name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PYTHON_BIN: python3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: monitoring/python_monitoring/requirements.txt
      - name: Installer PHP
        run: sudo apt-get update && sudo apt-get install -y php-cli php-curl php-mbstring php-mysql php-sqlite3 php-xml ripgrep
      - name: Installer les dépendances
        run: |
          php -r 'exit(extension_loaded("sodium") ? 0 : 1);'
          npm ci
          python3 -m pip install -r monitoring/python_monitoring/requirements.txt
          python3 -m pip install pip-audit
      - name: Contrôler la release
        run: |
          ./scripts/check-release.sh
          npm audit --audit-level=high
          pip-audit -r monitoring/python_monitoring/requirements.txt

  docker:
    runs-on: ubuntu-latest
    env:
      INSIGHT_DB_PASSWORD: ci_database_password
      INSIGHT_DB_ROOT_PASSWORD: ci_root_password
      INSIGHT_AGENT_MASTER_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      INSIGHT_NOTIFICATION_ENCRYPTION_KEY: abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
    steps:
      - uses: actions/checkout@v4
      - name: Construire et charger l’agent
        run: |
          docker build -f docker/agent/Dockerfile -t insight-agent:ci .
          docker run --rm insight-agent:ci --version
      - name: Valider Compose
        run: docker compose config --quiet
      - name: Construire et démarrer Insight
        run: docker compose up -d --build
      - name: Exécuter le smoke test
        run: ./scripts/smoke-test.sh
      - name: Afficher les journaux en cas d’échec
        if: failure()
        run: docker compose logs --no-color
      - name: Arrêter Insight
        if: always()
        run: docker compose down -v --remove-orphans
