services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${INSIGHT_DB_NAME:-insight}
      MARIADB_USER: ${INSIGHT_DB_USER:-insight}
      MARIADB_PASSWORD: ${INSIGHT_DB_PASSWORD:?Définissez INSIGHT_DB_PASSWORD dans .env}
      MARIADB_ROOT_PASSWORD: ${INSIGHT_DB_ROOT_PASSWORD:?Définissez INSIGHT_DB_ROOT_PASSWORD dans .env}
      TZ: ${INSIGHT_TIMEZONE:-Europe/Paris}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - insight_db:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  php:
    build:
      context: .
    restart: unless-stopped
    environment: &insight_environment
      INSIGHT_APP_NAME: ${INSIGHT_APP_NAME:-Insight}
      INSIGHT_PUBLIC_URL: ${INSIGHT_PUBLIC_URL:-http://localhost:8080}
      INSIGHT_CONTACT_EMAIL: ${INSIGHT_CONTACT_EMAIL:-contact@example.com}
      INSIGHT_TIMEZONE: ${INSIGHT_TIMEZONE:-Europe/Paris}
      INSIGHT_DEFAULT_LOCALE: ${INSIGHT_DEFAULT_LOCALE:-auto}
      INSIGHT_SUPPORTED_LOCALES: ${INSIGHT_SUPPORTED_LOCALES:-fr,en}
      INSIGHT_APP_ENV: ${INSIGHT_APP_ENV:-production}
      INSIGHT_DEV_AUTH_BYPASS: ${INSIGHT_DEV_AUTH_BYPASS:-0}
      INSIGHT_AUTH_DB_PATH: ${INSIGHT_AUTH_DB_PATH:-/var/lib/insight-auth/auth.sqlite}
      INSIGHT_AUTH_SESSION_TTL_SEC: ${INSIGHT_AUTH_SESSION_TTL_SEC:-43200}
      INSIGHT_AUTH_REMEMBER_TTL_SEC: ${INSIGHT_AUTH_REMEMBER_TTL_SEC:-2592000}
      INSIGHT_AUTH_MAX_ATTEMPTS: ${INSIGHT_AUTH_MAX_ATTEMPTS:-5}
      INSIGHT_AUTH_WINDOW_SEC: ${INSIGHT_AUTH_WINDOW_SEC:-900}
      INSIGHT_AUTH_COOKIE_SECURE: ${INSIGHT_AUTH_COOKIE_SECURE:-auto}
      INSIGHT_AUTH_COOKIE_SAMESITE: ${INSIGHT_AUTH_COOKIE_SAMESITE:-Lax}
      INSIGHT_API_ALLOWED_ORIGINS: ${INSIGHT_API_ALLOWED_ORIGINS:-http://localhost:8080}
      INSIGHT_SSO_ENABLED: ${INSIGHT_SSO_ENABLED:-0}
      INSIGHT_SSO_PROVIDER_NAME: ${INSIGHT_SSO_PROVIDER_NAME:-SSO}
      INSIGHT_SSO_ISSUER_URL: ${INSIGHT_SSO_ISSUER_URL:-}
      INSIGHT_SSO_ALLOWED_ENDPOINT_HOSTS: ${INSIGHT_SSO_ALLOWED_ENDPOINT_HOSTS:-}
      INSIGHT_SSO_CLIENT_ID: ${INSIGHT_SSO_CLIENT_ID:-}
      INSIGHT_SSO_CLIENT_SECRET: ${INSIGHT_SSO_CLIENT_SECRET:-}
      INSIGHT_SSO_SCOPES: ${INSIGHT_SSO_SCOPES:-openid profile email}
      INSIGHT_SSO_USERNAME_CLAIM: ${INSIGHT_SSO_USERNAME_CLAIM:-preferred_username}
      INSIGHT_SSO_GROUPS_CLAIM: ${INSIGHT_SSO_GROUPS_CLAIM:-groups}
      INSIGHT_SSO_ALLOWED_EMAILS: ${INSIGHT_SSO_ALLOWED_EMAILS:-}
      INSIGHT_SSO_ALLOWED_GROUPS: ${INSIGHT_SSO_ALLOWED_GROUPS:-}
      INSIGHT_SSO_ADMIN_GROUPS: ${INSIGHT_SSO_ADMIN_GROUPS:-}
      INSIGHT_SSO_REQUIRE_VERIFIED_EMAIL: ${INSIGHT_SSO_REQUIRE_VERIFIED_EMAIL:-1}
      INSIGHT_SSO_ALLOW_ALL: ${INSIGHT_SSO_ALLOW_ALL:-0}
      INSIGHT_SSO_AUTO_LOGIN: ${INSIGHT_SSO_AUTO_LOGIN:-0}
      INSIGHT_SSO_HIDE_LOCAL_LOGIN: ${INSIGHT_SSO_HIDE_LOCAL_LOGIN:-0}
      INSIGHT_DB_HOST: db
      INSIGHT_DB_PORT: 3306
      INSIGHT_DB_NAME: ${INSIGHT_DB_NAME:-insight}
      INSIGHT_DB_USER: ${INSIGHT_DB_USER:-insight}
      INSIGHT_DB_PASSWORD: ${INSIGHT_DB_PASSWORD:?Définissez INSIGHT_DB_PASSWORD dans .env}
      INSIGHT_MONITOR_INTERVAL_SEC: ${INSIGHT_MONITOR_INTERVAL_SEC:-60}
      INSIGHT_DISTRIBUTED_MODE: ${INSIGHT_DISTRIBUTED_MODE:-standalone}
      INSIGHT_AGENT_MASTER_SECRET: ${INSIGHT_AGENT_MASTER_SECRET:-}
      INSIGHT_AGENT_AUTO_REGISTER: ${INSIGHT_AGENT_AUTO_REGISTER:-1}
      INSIGHT_AGENT_REQUIRE_HTTPS: ${INSIGHT_AGENT_REQUIRE_HTTPS:-1}
      INSIGHT_AGENT_HMAC_WINDOW_SEC: ${INSIGHT_AGENT_HMAC_WINDOW_SEC:-300}
      INSIGHT_AGENT_NONCE_RETENTION_SEC: ${INSIGHT_AGENT_NONCE_RETENTION_SEC:-86400}
      INSIGHT_AGENT_DEFAULT_REPLICAS: ${INSIGHT_AGENT_DEFAULT_REPLICAS:-3}
      INSIGHT_AGENT_NODE_TTL_SEC: ${INSIGHT_AGENT_NODE_TTL_SEC:-180}
      INSIGHT_CONSENSUS_FRESHNESS_SEC: ${INSIGHT_CONSENSUS_FRESHNESS_SEC:-180}
      INSIGHT_AGENT_BATCH_SIZE: ${INSIGHT_AGENT_BATCH_SIZE:-200}
      INSIGHT_AGENT_CONFIG_REFRESH_SEC: ${INSIGHT_AGENT_CONFIG_REFRESH_SEC:-60}
      INSIGHT_AGENT_MAX_SAMPLE_AGE_DAYS: ${INSIGHT_AGENT_MAX_SAMPLE_AGE_DAYS:-7}
      INSIGHT_AGENT_RAW_RETENTION_DAYS: ${INSIGHT_AGENT_RAW_RETENTION_DAYS:-7}
      INSIGHT_AGENT_BATCH_RETENTION_DAYS: ${INSIGHT_AGENT_BATCH_RETENTION_DAYS:-7}
      INSIGHT_CONSENSUS_BUCKET_SEC: ${INSIGHT_CONSENSUS_BUCKET_SEC:-60}
      INSIGHT_CONSENSUS_RETENTION_DAYS: ${INSIGHT_CONSENSUS_RETENTION_DAYS:-90}
      INSIGHT_CONSENSUS_FAILURE_WINDOWS: ${INSIGHT_CONSENSUS_FAILURE_WINDOWS:-2}
      INSIGHT_CONSENSUS_RECOVERY_WINDOWS: ${INSIGHT_CONSENSUS_RECOVERY_WINDOWS:-2}
      INSIGHT_DISTRIBUTED_INCIDENTS: ${INSIGHT_DISTRIBUTED_INCIDENTS:-1}
      INSIGHT_METRICS_ENABLED: ${INSIGHT_METRICS_ENABLED:-0}
      INSIGHT_METRICS_TOKEN: ${INSIGHT_METRICS_TOKEN:-}
      INSIGHT_DISABLE_NOTIFICATIONS: ${INSIGHT_DISABLE_NOTIFICATIONS:-1}
      INSIGHT_NOTIFICATION_ENCRYPTION_KEY: ${INSIGHT_NOTIFICATION_ENCRYPTION_KEY:?Définissez INSIGHT_NOTIFICATION_ENCRYPTION_KEY dans .env}
      INSIGHT_NOTIFICATION_EMAILS: ${INSIGHT_NOTIFICATION_EMAILS:-}
      INSIGHT_ALLOWED_ORIGINS: ${INSIGHT_ALLOWED_ORIGINS:-http://localhost:8080}
      INSIGHT_EMAIL_SMTP_HOST: ${INSIGHT_EMAIL_SMTP_HOST:-}
      INSIGHT_EMAIL_SMTP_PORT: ${INSIGHT_EMAIL_SMTP_PORT:-465}
      INSIGHT_EMAIL_SMTP_USERNAME: ${INSIGHT_EMAIL_SMTP_USERNAME:-}
      INSIGHT_EMAIL_SMTP_PASSWORD: ${INSIGHT_EMAIL_SMTP_PASSWORD:-}
      INSIGHT_EMAIL_SMTP_ENCRYPTION: ${INSIGHT_EMAIL_SMTP_ENCRYPTION:-ssl}
      INSIGHT_EMAIL_FROM_NAME: ${INSIGHT_EMAIL_FROM_NAME:-Insight}
      INSIGHT_SMS_USER: ${INSIGHT_SMS_USER:-}
      INSIGHT_SMS_PASSWORD: ${INSIGHT_SMS_PASSWORD:-}
      PYTHONPATH: /opt/insight-pydeps
      PYTHON_BIN: /usr/bin/python3
      TZ: ${INSIGHT_TIMEZONE:-Europe/Paris}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - insight_auth:/var/lib/insight-auth
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(extension_loaded(\"sodium\") ? 0 : 1);' && php-fpm -t >/dev/null 2>&1 && kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
    restart: unless-stopped
    environment:
      <<: *insight_environment
      INSIGHT_SSO_ENABLED: "0"
      INSIGHT_SSO_CLIENT_SECRET: ""
    command: ["/var/www/insight/docker/worker/scheduler.sh"]
    cap_add:
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f monitoring/runtime/scheduler.heartbeat && test $$(($$(date +%s) - $$(stat -c %Y monitoring/runtime/scheduler.heartbeat))) -lt 30"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${INSIGHT_HTTP_BIND:-0.0.0.0}:${INSIGHT_HTTP_PORT:-8080}:80"
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  insight_db:
  insight_auth:
