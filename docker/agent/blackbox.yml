modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      follow_redirects: true
  tcp_connect:
    prober: tcp
    timeout: 10s
    tcp:
      preferred_ip_protocol: ip4
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4
  grpc:
    prober: grpc
    timeout: 10s
    grpc:
      tls: true
      preferred_ip_protocol: ip4
  grpc_plain:
    prober: grpc
    timeout: 10s
    grpc:
      tls: false
      preferred_ip_protocol: ip4
  dns:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: ip4
      transport_protocol: udp
      query_name: example.com
      query_type: A
      valid_rcodes:
        - NOERROR
