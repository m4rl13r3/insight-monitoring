server {
    listen 80;
    server_name _;
    root /var/www/insight/public;
    index index.php;

    charset utf-8;
    client_max_body_size 2m;
    server_tokens off;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $php_upstream php:9000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.html {
        return 301 /;
    }

    location = /metrics {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/insight/public/metrics.php;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass $php_upstream;
    }

    location = /.well-known/openid-configuration {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/insight/public/api/oauth/openid-configuration.php;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass $php_upstream;
    }

    location ^~ /config/ {
        deny all;
    }

    location ^~ /logs/ {
        deny all;
    }

    location ^~ /api/hourly_report/ {
        deny all;
    }

    location ~ ^/admin/_.*\.php$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(?:env|ini|log|sql|sqlite|bak)$ {
        deny all;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/insight/public$fastcgi_script_name;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param HTTP_PROXY "";
        fastcgi_hide_header X-Powered-By;
        fastcgi_pass $php_upstream;
        fastcgi_read_timeout 60s;
    }

    location ~* \.(css|js|svg|ico|webmanifest|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
}
